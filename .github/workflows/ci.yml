name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Security audit (npm audit)
        run: npm audit --audit-level=high

  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          # wasm32-wasip1 is required for WASM plugin builds (AFR-41)
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - name: Check format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all -- -D warnings
      - name: Test (host)
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build example WASM plugin
        run: >
          cargo build
          --manifest-path src-tauri/Cargo.toml
          --target wasm32-wasip1
          --release
          -p example-mt-provider
      - name: Security audit (cargo-audit)
        run: |
          cargo install cargo-audit --quiet
          cargo audit --manifest-path src-tauri/Cargo.toml
