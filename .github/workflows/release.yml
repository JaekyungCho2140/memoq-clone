name: Release

# Triggers on `v*` tag push — e.g. `git tag v1.2.3 && git push --tags`
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Releases and upload assets

jobs:
  # ── Build cross-platform installers ─────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary (Intel + Apple Silicon) + DMG
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Windows — NSIS .exe installer
          - platform: windows-latest
            args: "--bundles nsis"
            rust-targets: ""
          # Linux — AppImage (optional, included for completeness)
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }},wasm32-wasip1

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - run: npm ci

      # Build example WASM plugin so it is bundled as a demo
      - name: Build WASM example plugin
        shell: bash
        run: |
          cargo build \
            --manifest-path src-tauri/Cargo.toml \
            --target wasm32-wasip1 \
            --release \
            -p example-mt-provider
          mkdir -p src-tauri/plugins/example-mt-provider/dist
          cp src-tauri/target/wasm32-wasip1/release/example_mt_provider.wasm \
             src-tauri/plugins/example-mt-provider/dist/plugin.wasm

      # ── Tauri build + sign + upload to GitHub Releases ──────────────────
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Tauri Updater signing ────────────────────────────────────────
          # To enable in-app updates, generate a keypair and add secrets:
          #   npx tauri signer generate -w ~/.tauri/memoqclone.key
          # Then:
          #   TAURI_SIGNING_PRIVATE_KEY  → GitHub secret (contents of .key file)
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD → passphrase (empty string if none)
          #   TAURI_SIGNING_PUBLIC_KEY   → copy into tauri.conf.json plugins.updater.pubkey
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ── macOS code signing + notarization ───────────────────────────
          # Uncomment and set these secrets to enable Apple notarization:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        with:
          tagName: ${{ github.ref_name }}
          releaseName: "memoQ Clone ${{ github.ref_name }}"
          releaseBody: |
            ## memoQ Clone ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes.

            ## Downloads

            | Platform | Installer | Notes |
            |----------|-----------|-------|
            | Windows  | `memoQ-Clone_*_x64-setup.exe` | NSIS installer |
            | macOS    | `memoQ-Clone_*_universal.dmg` | Universal (Intel + Apple Silicon) |
            | Linux    | `memoQ-Clone_*_amd64.AppImage` | Portable |

            ## Auto-update

            If you have an older version installed, the app will prompt you to update automatically.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}

      # ── Validate build artifacts ─────────────────────────────────────────
      # Ensures expected installer files were produced and are non-empty.
      # Fails the build if a required artifact is missing or zero-byte.
      - name: Validate build artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $bundleDir = "src-tauri\target\release\bundle"
          Write-Host "Scanning $bundleDir for Windows installer artifacts..."

          $installers = @()
          $installers += Get-ChildItem -Path $bundleDir -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
          $installers += Get-ChildItem -Path $bundleDir -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue

          if ($installers.Count -eq 0) {
            Write-Error "No .exe or .msi installer found under $bundleDir"
            exit 1
          }

          $failed = $false
          foreach ($f in $installers) {
            if ($f.Length -eq 0) {
              Write-Error "Zero-byte artifact: $($f.FullName)"
              $failed = $true
            } else {
              $sizeMb = [math]::Round($f.Length / 1MB, 2)
              Write-Host "OK  $($f.Name)  ($sizeMb MB)"
            }
          }
          if ($failed) { exit 1 }
          Write-Host "All Windows artifacts validated successfully."

      - name: Validate build artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          echo "Scanning for macOS installer artifacts..."
          found=0
          for f in \
            src-tauri/target/release/bundle/**/*.dmg \
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg; do
            [ -f "$f" ] || continue
            size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f")
            if [ "$size" -eq 0 ]; then
              echo "ERROR: Zero-byte artifact: $f" >&2; exit 1
            fi
            echo "OK  $(basename "$f")  ($(( size / 1048576 )) MB)"
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "ERROR: No .dmg artifact found" >&2; exit 1
          fi
          echo "All macOS artifacts validated successfully."

      - name: Validate build artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          echo "Scanning for Linux installer artifacts..."
          found=0
          for f in src-tauri/target/release/bundle/**/*.AppImage; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ "$size" -eq 0 ]; then
              echo "ERROR: Zero-byte artifact: $f" >&2; exit 1
            fi
            echo "OK  $(basename "$f")  ($(( size / 1048576 )) MB)"
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "WARNING: No .AppImage found (Linux build may be optional)"
          fi

  # ── Publish the `latest.json` updater manifest ──────────────────────────
  # After all platform builds succeed, publish the release (draft → published).
  # The tauri-action creates a `latest.json` alongside each platform artifact.
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Promote draft release to published
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
